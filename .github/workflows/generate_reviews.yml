name: Generate reviews.xml

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch and save reviews
        run: |
          curl -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: cs-CZ,cs;q=0.9" \
            -H "Referer: https://www.heureka.cz/" \
            -o data/reviews.xml \
            "https://www.heureka.cz/direct/dotaznik/export-review.php?key=92e89a3db1d387c08989d130cf1977f0"
          echo "Done. File size: $(wc -c < data/reviews.xml) bytes"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews.xml
          git diff --cached --quiet || git commit -m "Auto-update reviews.xml $(date '+%Y-%m-%d')"
          git push
